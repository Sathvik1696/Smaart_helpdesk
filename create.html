<!DOCTYPE html>
<html>

<head>
    <title>Create Complaint</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            background: linear-gradient(120deg, #d4fcf9, #f6d1f6);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 400px;
            padding: 40px;
            border-radius: 25px;
            background: white;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #555;
        }

        label {
            font-size: 14px;
            color: #777;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            margin-bottom: 18px;
            border: none;
            border-radius: 12px;
            background: #f5f7fb;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            background: linear-gradient(45deg, #a18cd1, #fbc2eb);
            color: white;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #888;
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Create Complaint</h2>

        <form method="POST">
            {% csrf_token %}

            <label>Title</label>
            <input type="text" name="title" required>

            <label>Description</label>
            <textarea name="description" rows="4" required></textarea>

            <button type="submit">Submit</button>
        </form>

        <a href="/" class="back">← Back</a>

    </div>
</body>

</html>
