<!DOCTYPE html>
<html>

<head>
    <title>Complaints</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(120deg, #d4fcf9, #f6d1f6);
            display: flex;
            justify-content: center;
            padding: 50px 20px;
        }

        /* MAIN CARD */
        .container {
            width: 95%;
            max-width: 1100px;
            background: white;
            border-radius: 30px;
            padding: 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
        }

        /* TITLE */
        h1 {
            text-align: center;
            color: #555;
            margin-bottom: 30px;
        }

        /* ADD BUTTON */
        .add {
            display: inline-block;
            padding: 12px 20px;
            border-radius: 14px;
            text-decoration: none;
            background: linear-gradient(45deg, #302055, #fbc2eb);
            color: white;
            font-weight: 500;
            transition: .3s;
        }

        .add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            overflow: hidden;
            border-radius: 20px;
        }

        th {
            text-align: left;
            padding: 16px;
            background: #f3f6fb;
            color: #666;
        }

        td {
            padding: 16px;
            color: #555;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #fafcff;
        }

        /* STATUS BADGES */
        .status {
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }

        .pending {
            background: #ffe9b3;
            color: #8a6d00;
        }

        .progress {
            background: #d9f2ff;
            color: #0077aa;
        }

        .resolved {
            background: #d6f5e9;
            color: #00895b;
        }

        /* ACTION BUTTONS */
        .actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 14px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 13px;
            color: white;
            transition: .25s;
        }

        .edit {
            background: linear-gradient(45deg, #89f7fe, #66a6ff);
        }

        .delete {
            background: linear-gradient(45deg, #ff9a9e, #fecfef);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
        }

        /* EMPTY */
        .empty {
            text-align: center;
            color: #aaa;
        }

        /* MOBILE */
        @media(max-width:700px) {
            table {
                font-size: 13px;
            }

            .btn {
                padding: 6px 10px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Complaint List</h1>

        <a href="/create/" class="add">＋ New Complaint</a>

        <table>

            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>

            {% for c in complaints %}
            <tr>

                <td>{{c.id}}</td>
                <td>{{c.title}}</td>
                <td>{{c.description}}</td>

                <td>
                    <span class="status
{% if c.status == 'Pending' %}pending
{% elif c.status == 'In Progress' %}progress
{% else %}resolved
{% endif %}">
                        {{c.status}}
                    </span>
                </td>

                <td class="actions">
                    <a href="/update/{{c.id}}/" class="btn edit">Edit</a>
                    <a href="/delete/{{c.id}}/" class="btn delete">Delete</a>
                </td>

            </tr>

            {% empty %}
            <tr>
                <td colspan="5" class="empty">No complaints yet ✨</td>
            </tr>
            {% endfor %}

        </table>

    </div>

</body>

</html>
